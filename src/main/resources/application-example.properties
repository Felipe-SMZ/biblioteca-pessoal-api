# ==========================================================
# CONFIGURAÇÕES DA APLICAÇÃO
# ==========================================================
spring.application.name=biblioteca-pessoal

# ==========================================================
# BANCO DE DADOS (Substitua pelos seus dados locais)
# ==========================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:biblioteca_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:sua_senha}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# JPA / HIBERNATE
# ==========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# SEGURANÇA / JWT
# ==========================================================
# Chave secreta para assinatura dos tokens (mínimo 32 caracteres)
jwt.secret=${JWT_SECRET:exemplo_de_chave_secreta_muito_longa_e_segura_123456}

# Tempo de expiração em milissegundos (Ex: 86400000 = 24h)
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# Nome do emissor do token
jwt.issuer=${JWT_ISSUER:biblioteca-pessoal-api}
